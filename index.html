<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akemi</title>
  <meta name="description" content="Programmer who focuses on simplicity and usability." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <main class="page">
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">
      <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 0 1 11.21 3a7 7 0 1 0 9.79 9.79Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></span>
      <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></svg></span>
    </button>

    <article class="profile-card">
      <div class="profile-card__image-wrap">
        <img class="profile-card__image" src="https://files.catbox.moe/1aok2m.png" alt="Akemi" width="768" height="896" />
      </div>

      <div class="profile-card__content">
        <div class="profile-card__heading">
          <h1 class="profile-card__name">Akemi</h1>
          <span class="verified-badge" aria-label="Verified profile"><svg class="verified-badge__burst" viewBox="0 0 24 24"><path d="M12 1.5l2.39 1.74 2.95-.32 1.43 2.6 2.6 1.43-.32 2.95L22.5 12l-1.74 2.39.32 2.95-2.6 1.43-1.43 2.6-2.95-.32L12 22.5l-2.39-1.74-2.95.32-1.43-2.6-2.6-1.43.32-2.95L1.5 12l1.74-2.39-.32-2.95 2.6-1.43L6.95 2.92l2.95.32L12 1.5Z"></path></svg><svg class="verified-badge__check" viewBox="0 0 24 24" fill="none"><path d="m7 12.5 3.1 3.1L17.5 8" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"></path></svg></span>
        </div>

        <p class="profile-card__bio">Programmer who focuses on simplicity and usability.</p>

        <div id="container06">
          <div id="music-dynamic" aria-live="polite" aria-label="Music status">
            <article id="now-playing-card" class="is-loading" aria-label="Now playing on Spotify via Last.fm" aria-busy="true">
              <div class="now-playing-art-wrap">
                <img id="now-playing-art" class="now-playing-art" src="./assets/Haimiya-senpai wa Kowakute Kawaii.jpg" alt="Current track artwork" />
                <span class="skeleton skeleton--art" aria-hidden="true"></span>
              </div>
              <div class="now-playing-info">
                <p class="now-playing-label"><span class="now-playing-pulse" aria-hidden="true"></span>Listening</p>
                <p id="now-playing-track" class="now-playing-track"><span class="skeleton skeleton--line skeleton--line-track" aria-hidden="true"></span><span class="now-playing-text">Loading track...</span></p>
                <p id="now-playing-artist" class="now-playing-artist"><span class="skeleton skeleton--line skeleton--line-artist" aria-hidden="true"></span><span class="now-playing-text">Checking Last.fm</span></p>
                <a id="now-playing-link" class="now-playing-link" href="https://www.last.fm" target="_blank" rel="noopener noreferrer">Open on Last.fm</a>
              </div>
            </article>
          </div>
        </div>

        <div class="profile-card__actions">
          <button class="action-button action-button--secondary" type="button">About</button>
          <button class="action-button action-button--secondary" type="button">Message</button>
          <button class="action-button action-button--primary follow-button" type="button" onclick="setTimeout(function(){window.open('https://discord.com/users/334980960351158276','_blank');},220)"><span>Follow</span><svg class="follow-button__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path></svg></button>
        </div>
      </div>
    </article>
  </main>
  <script src="./script.js"></script>
</body>
</html>
