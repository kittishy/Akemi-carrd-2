<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sophie Bennett - Product Designer</title>
    <meta
      name="description"
      content="Product Designer who focuses on simplicity and usability."
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <button
        class="theme-toggle"
        id="theme-toggle"
        type="button"
        aria-label="Toggle theme"
      >
        <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M21 12.79A9 9 0 0 1 11.21 3a7 7 0 1 0 9.79 9.79Z"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
          </svg>
        </span>
        <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"></circle>
            <path
              d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            ></path>
          </svg>
        </span>
      </button>

      <article class="profile-card">
        <div class="profile-card__image-wrap">
          <img
            class="profile-card__image"
            src="./assets/profile-sophie.jpg"
            alt="Sophie Bennett"
            width="768"
            height="896"
          />
        </div>

        <div class="profile-card__content">
          <div class="profile-card__heading">
            <h1 class="profile-card__name">Sophie Bennett</h1>
            <span class="verified-badge" aria-label="Verified profile">
              <svg class="verified-badge__burst" viewBox="0 0 24 24">
                <path
                  d="M12 1.5l2.39 1.74 2.95-.32 1.43 2.6 2.6 1.43-.32 2.95L22.5 12l-1.74 2.39.32 2.95-2.6 1.43-1.43 2.6-2.95-.32L12 22.5l-2.39-1.74-2.95.32-1.43-2.6-2.6-1.43.32-2.95L1.5 12l1.74-2.39-.32-2.95 2.6-1.43L6.95 2.92l2.95.32L12 1.5Z"
                ></path>
              </svg>
              <svg class="verified-badge__check" viewBox="0 0 24 24" fill="none">
                <path
                  d="m7 12.5 3.1 3.1L17.5 8"
                  stroke="currentColor"
                  stroke-width="3.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                ></path>
              </svg>
            </span>
          </div>

          <p class="profile-card__bio">
            Product Designer who focuses<br />
            on simplicity &amp; usability.
          </p>

          <div class="profile-card__actions">
            <button class="action-button action-button--secondary" type="button">
              About
            </button>
            <button class="action-button action-button--secondary" type="button">
              Message
            </button>
            <button class="action-button action-button--primary follow-button" type="button">
              <span>Follow</span>
              <svg class="follow-button__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M12 5v14M5 12h14"
                  stroke="currentColor"
                  stroke-width="2.2"
                  stroke-linecap="round"
                ></path>
              </svg>
            </button>
          </div>
        </div>
      </article>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
